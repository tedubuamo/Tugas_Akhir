<body class="bg-gradient-to-br from-primary-fixed to-surface-container text-on-surface h-screen flex flex-col transition-colors duration-300">
<div class="flex-1 flex items-center justify-center px-4 sm:px-6 lg:px-8 relative overflow-hidden">
<!-- Subtle organic background decoration -->
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-container rounded-full mix-blend-multiply filter blur-3xl opacity-60 animate-blob"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-tertiary-container rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-blob animation-delay-2000"></div>
<div class="max-w-md w-full space-y-8 bg-surface/90 backdrop-blur-md p-10 rounded-[3rem] shadow-[0_10px_40px_-10px_rgba(0,119,204,0.15)] border border-outline-variant/50 relative z-10">
<div class="text-center">
<div class="w-16 h-16 mx-auto rounded-[2rem] bg-primary-container flex items-center justify-center text-on-primary-container shadow-sm mb-6">
<svg class="w-8 h-8" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<h2 class="text-3xl font-bold text-on-surface tracking-tight">Admin Login</h2>
<p class="mt-3 text-sm text-on-surface-variant">Masuk untuk mengelola sistem JobMatcher</p>
</div>
<form class="mt-8 space-y-6" id="loginForm">
<div class="space-y-5">
<div>
<label class="text-sm font-semibold text-on-surface-variant" for="username">Username</label>
<input class="mt-1.5 appearance-none block w-full px-5 py-3.5 border border-transparent rounded-full bg-surface-container-highest text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent sm:text-sm transition-all" id="username" name="username" placeholder="admin" required="" type="text"/>
</div>
<div>
<label class="text-sm font-semibold text-on-surface-variant" for="password">Password</label>
<input class="mt-1.5 appearance-none block w-full px-5 py-3.5 border border-transparent rounded-full bg-surface-container-highest text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent sm:text-sm transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<button class="w-full flex justify-center py-4 px-5 border border-transparent rounded-full shadow-[0_4px_14px_0_rgba(0,119,204,0.39)] text-sm font-bold text-on-primary bg-primary hover:bg-on-primary-fixed-variant hover:shadow-[0_6px_20px_rgba(0,119,204,0.3)] hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200" type="submit">
          Masuk Dashboard
        </button>
</form>
<div class="text-center mt-6">
<a class="text-sm text-primary hover:text-on-primary-fixed-variant hover:underline transition-colors font-medium" href="index.html">← Kembali ke Halaman Utama</a>
</div>
</div>
</div>
<script>
    // --- DARK MODE INITIALIZATION ---
    (function() {
        const isDark = localStorage.getItem('darkMode') === 'true' || 
            (!('darkMode' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if(isDark) document.documentElement.classList.add('dark');
    })();

    // --- LOGIN LOGIC ---
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;

      // Simulasi sukses untuk saat ini:
      if(user === 'admin' && pass === 'admin123') {
        localStorage.setItem('adminToken', 'dummy-token-123');
        window.location.href = 'admin.html';
      } else {
        alert('Username atau Password salah! (Coba: admin / admin123)');
      }
    });
  </script>
